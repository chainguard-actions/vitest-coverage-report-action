name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Copy fixture coverage files to expected location
        run: |
          mkdir -p coverage
          cp $GITHUB_WORKSPACE/actions/hardened/davelosert--vitest-coverage-report-action/v2.9.3/tests/fixtures/coverage/coverage-summary.json coverage/coverage-summary.json
          cp $GITHUB_WORKSPACE/actions/hardened/davelosert--vitest-coverage-report-action/v2.9.3/tests/fixtures/coverage/coverage-final.json coverage/coverage-final.json

      - id: action
        uses: .
        with:
          github-token: ${{ github.token }}
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          file-coverage-mode: none
          comment-on: none

      - name: Assert action completed successfully
        run: |
          echo "Action completed without error"
          echo "PASS"
