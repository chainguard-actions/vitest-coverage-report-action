name: Test json-summary-compare-path input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up coverage files from fixtures
        run: |
          mkdir -p coverage coverage-prev
          cp "$GITHUB_WORKSPACE/actions/hardened/davelosert--vitest-coverage-report-action/v2.11.0/tests/fixtures/coverage/coverage-summary.json" coverage/coverage-summary.json
          cp "$GITHUB_WORKSPACE/actions/hardened/davelosert--vitest-coverage-report-action/v2.11.0/tests/fixtures/coverage/coverage-final.json" coverage/coverage-final.json
          cp "$GITHUB_WORKSPACE/actions/hardened/davelosert--vitest-coverage-report-action/v2.11.0/tests/fixtures/coverage-prev/coverage-summary.json" coverage-prev/coverage-summary.json

      - id: action
        uses: .
        with:
          github-token: ${{ github.token }}
          json-summary-path: coverage/coverage-summary.json
          json-summary-compare-path: coverage-prev/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          file-coverage-mode: none
          comment-on: none

      - name: Assert action completed successfully with compare path
        run: |
          echo "Action completed with json-summary-compare-path without error"
          echo "PASS"
