name: Test vite-config-path input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Copy fixture coverage files
        run: |
          mkdir -p coverage
          cp $GITHUB_WORKSPACE/actions/hardened/davelosert--vitest-coverage-report-action/v2.10.0/tests/fixtures/coverage/coverage-summary.json coverage/coverage-summary.json
          cp $GITHUB_WORKSPACE/actions/hardened/davelosert--vitest-coverage-report-action/v2.10.0/tests/fixtures/coverage/coverage-final.json coverage/coverage-final.json

      - id: action
        uses: .
        with:
          github-token: ${{ github.token }}
          vite-config-path: ${{ github.workspace }}/actions/hardened/davelosert--vitest-coverage-report-action/v2.10.0/tests/fixtures/vite.config.ts
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          file-coverage-mode: none
          comment-on: none

      - name: Assert action completed successfully with vite-config-path
        run: |
          echo "Action completed without error using vite-config-path"
          echo "PASS"
